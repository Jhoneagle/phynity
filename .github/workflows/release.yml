name: Release CD

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-2022
            cc: clang-cl
            cxx: clang-cl
            triplet: x64-windows
          - os: linux
            runner: ubuntu-22.04
            cc: clang
            cxx: clang++
            triplet: x64-linux
          - os: macos
            runner: macos-14
            cc: clang
            cxx: clang++
            triplet: arm64-osx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Bootstrap vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Setup Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          ninja --version

      - name: Setup dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang lld python3 zip

      - name: Setup dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja python3

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg/archives
            ~/.cache/vcpkg/src
            ${{ env.VCPKG_ROOT }}/archives
            ${{ env.VCPKG_ROOT }}/src
          key: vcpkg-${{ matrix.os }}-release-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Configure CMake (release-lto)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset=release-lto -DPHYNITY_BUILD_TESTS=ON -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: Build
        run: cmake --build build/release-lto -j

      - name: Run full tests (exclude performance)
        shell: bash
        run: |
          python tools/run_ctest_with_retries.py \
            --build-dir build/release-lto \
            --config Release \
            --regex "^(unit\\.|validation\\.)" \
            --exclude-label performance \
            --parallel 2 \
            --max-retries 2 \
            --report-file build/release-lto/test-retries/release-${{ matrix.os }}.txt \
            --output-on-failure

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $files = @("build/release-lto/sandbox/phynity_sandbox.exe")
          $dlls = Get-ChildItem -Path "build/release-lto" -Filter *.dll -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
          $files += $dlls
          Compress-Archive -Path $files -DestinationPath "dist/phynity-${{ github.ref_name }}-windows.zip" -Force

      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -czf "dist/phynity-${GITHUB_REF_NAME}-${{ matrix.os }}.tar.gz" -C build/release-lto/sandbox phynity_sandbox

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ github.ref_name }}
          path: dist/*
          retention-days: 90

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ github.ref_name }}
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          generate_release_notes: true
