name: PR Gate - Build and Quality Checks

on:
  pull_request:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:

env:
  CMAKE_VERSION: 3.27
  VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  # Job 1: Build and test on all platforms with unit/validation tests
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-2022
            generator: Ninja
            cc: clang-cl
            cxx: clang-cl
            build_type: Release
            triplet: x64-windows

          - os: linux
            runner: ubuntu-22.04
            generator: Ninja
            cc: clang
            cxx: clang++
            build_type: Release
            triplet: x64-linux

          - os: macos
            runner: macos-14
            generator: Ninja
            cc: clang
            cxx: clang++
            build_type: Release
            triplet: arm64-osx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Bootstrap vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Setup vcpkg cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('VCPKG_BINARY_SOURCES', process.env.VCPKG_BINARY_SOURCES)

      - name: Restore vcpkg cache (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg/archives
            ~/.cache/vcpkg/src
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Restore vcpkg cache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/archives
            ${{ env.VCPKG_ROOT }}/src
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-windows-

      - name: Setup Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          ninja --version

      - name: Setup Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup LLVM/Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm-dev

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset=release -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DPHYNITY_BUILD_TESTS=ON -DPHYNITY_WARNINGS_AS_ERRORS=ON -DPHYNITY_ENABLE_SANITIZERS=OFF -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: Build
        run: cmake --build build/release --config ${{ matrix.build_type }} -j

      - name: Run Unit Tests
        run: |
          python tools/run_ctest_with_retries.py \
            --build-dir build/release \
            --config ${{ matrix.build_type }} \
            --regex "^unit\\." \
            --parallel 2 \
            --max-retries 2 \
            --report-file build/release/test-retries/unit-${{ matrix.os }}.txt \
            --output-on-failure

      - name: Run Validation Tests
        run: |
          python tools/run_ctest_with_retries.py \
            --build-dir build/release \
            --config ${{ matrix.build_type }} \
            --regex "^validation\\." \
            --exclude-label performance \
            --parallel 2 \
            --max-retries 2 \
            --report-file build/release/test-retries/validation-${{ matrix.os }}.txt \
            --output-on-failure

      - name: Upload retry reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retry-reports-${{ matrix.os }}
          path: build/release/test-retries/
          retention-days: 30

      - name: Archive test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: build/release/Testing/
          retention-days: 30

  # Job 2: Format check (clang-format)
  format-check:
    name: Format Check (clang-format)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup clang-format
        run: |
          # Install clang-format 18.1.8 to match local development environment
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-format-18=1:18.1.8*
          sudo ln -sf /usr/bin/clang-format-18 /usr/bin/clang-format
          clang-format --version

      - name: Check formatting
        run: |
          echo "Checking code formatting with clang-format..."
          FAILED=0
          while IFS= read -r -d '' file; do
            if ! diff -u "$file" <(clang-format --style=file "$file"); then
              echo ""
              echo "❌ Format issue in: $file"
              echo "^^^ See diff above ^^^"
              echo ""
              FAILED=1
            fi
          done < <(find src tests -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) -print0)
          if [ $FAILED -eq 1 ]; then
            echo "Format check failed. Run 'tools/format.sh' locally to fix."
            exit 1
          fi
          echo "✓ All files properly formatted"

  # Job 3: Static analysis (clang-tidy)
  static-analysis:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy ninja-build

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg/archives
            ~/.cache/vcpkg/src
          key: vcpkg-linux-clang-tidy-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-linux-

      - name: Configure CMake for static analysis
        run: cmake --preset=release -DCMAKE_BUILD_TYPE=Release -DPHYNITY_BUILD_TESTS=ON -DVCPKG_TARGET_TRIPLET=x64-linux

      - name: Run clang-tidy
        run: |
          set -euo pipefail
          cd build/release
          # Generate compile_commands.json if not present
          [ -f compile_commands.json ] || cmake --build . --target all

          # Run clang-tidy on the full source set with workflow-enforced failures.
          find ../../src -type f -name "*.cpp" | sort | while read file; do
            echo "Analyzing: $file"
            clang-tidy -p . "$file"
          done

      - name: Archive clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: build/release/
          retention-days: 30

  # Job 3b: Coverage (non-blocking)
  coverage:
    name: Coverage (non-blocking)
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ gcovr ninja-build

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg/archives
            ~/.cache/vcpkg/src
          key: vcpkg-linux-coverage-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-linux-

      - name: Configure CMake for coverage
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake --preset=debug \
            -DPHYNITY_BUILD_TESTS=ON \
            -DPHYNITY_ENABLE_SANITIZERS=OFF \
            -DPHYNITY_WARNINGS_AS_ERRORS=OFF \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_CXX_FLAGS="--coverage -O0 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_SHARED_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build/debug -j

      - name: Run tests for coverage
        run: |
          python tools/run_ctest_with_retries.py \
            --build-dir build/debug \
            --config Debug \
            --regex "^(unit\\.|validation\\.)" \
            --exclude-label performance \
            --parallel 2 \
            --max-retries 2 \
            --report-file build/debug/test-retries/coverage.txt \
            --output-on-failure

      - name: Generate coverage reports
        run: |
          gcovr \
            --root . \
            --object-directory build/debug \
            --xml-pretty --output build/debug/coverage.xml \
            --html-details build/debug/coverage.html \
            --exclude 'tests/.*'

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build/debug/coverage.xml
            build/debug/coverage.html
            build/debug/test-retries/
          retention-days: 30

  # Job 4: Sanitizers (ASAN + UBSAN on Linux/macOS)
  sanitizers:
    name: Sanitizers (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
            generator: Ninja
            cc: clang
            cxx: clang++
            triplet: x64-linux

          - os: macos
            runner: macos-14
            generator: Ninja
            cc: clang
            cxx: clang++
            triplet: arm64-osx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Bootstrap vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Setup Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang lld

      - name: Setup Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg/archives
            ~/.cache/vcpkg/src
          key: vcpkg-${{ matrix.os }}-sanitizers-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Configure CMake with sanitizers
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset=debug-asan -DPHYNITY_BUILD_TESTS=ON -DPHYNITY_ENABLE_SANITIZERS=ON -DPHYNITY_WARNINGS_AS_ERRORS=OFF -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: Build with sanitizers
        run: cmake --build build/debug-asan -j

      - name: Run tests with ASAN
        working-directory: build/debug-asan
        env:
          ASAN_OPTIONS: 'halt_on_error=1:abort_on_error=1'
          UBSAN_OPTIONS: 'halt_on_error=1:abort_on_error=1'
        run: ctest -C Debug --output-on-failure -LE performance -j

      - name: Archive sanitizer reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-report-${{ matrix.os }}
          path: build/debug-asan/
          retention-days: 90

  # Job 5: Flaky budget check (non-blocking)
  flaky-check:
    name: Flaky Budget Check (non-blocking)
    runs-on: ubuntu-22.04
    needs: [build-and-test]
    if: always()
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch flaky history from perf-history branch
        shell: bash
        run: |
          mkdir -p infra/history
          git fetch origin perf-history || true
          if git show origin/perf-history:infra/history/flaky_test_history.csv > infra/history/flaky_test_history.csv 2>/dev/null; then
            echo "Fetched flaky history from perf-history"
          else
            echo "No flaky history found in perf-history; proceeding with empty history window"
          fi

      - name: Evaluate flaky budget (14d, threshold 3)
        shell: bash
        run: |
          python3 tools/check_flaky_budget.py \
            --history-csv infra/history/flaky_test_history.csv \
            --days 14 \
            --threshold 3 \
            --output-markdown infra/history/flaky_summary.md

      - name: Publish flaky budget summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Flaky Budget Status"
            echo
            cat infra/history/flaky_summary.md
          } >> "$GITHUB_STEP_SUMMARY"

  # Job 6: PR Quality Gate Summary
  quality-gate:
    name: Quality Gate Summary
    runs-on: ubuntu-22.04
    needs: [build-and-test, format-check, static-analysis, sanitizers]
    if: always()
    steps:
      - name: Check all required checks passed
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" || \
                "${{ needs.format-check.result }}" != "success" || \
                "${{ needs.static-analysis.result }}" != "success" || \
                "${{ needs.sanitizers.result }}" != "success" ]]; then
            echo "❌ PR Quality Gate FAILED"
            echo ""
            echo "Failed checks:"
            [ "${{ needs.build-and-test.result }}" != "success" ] && echo "  - Build and Tests"
            [ "${{ needs.format-check.result }}" != "success" ] && echo "  - Format Check"
            [ "${{ needs.static-analysis.result }}" != "success" ] && echo "  - Static Analysis"
            [ "${{ needs.sanitizers.result }}" != "success" ] && echo "  - Sanitizers"
            exit 1
          fi
          
          echo "✅ PR Quality Gate PASSED"
          echo "  ✓ Build and Tests"
          echo "  ✓ Format Check"
          echo "  ✓ Static Analysis"
          echo "  ✓ Sanitizers (Linux/macOS)"
