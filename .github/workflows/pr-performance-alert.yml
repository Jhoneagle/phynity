name: PR Performance Alert

on:
  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - "src/**"
      - "tests/**"
      - "tools/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "vcpkg.json"
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  pr-performance-alert:
    name: PR Performance Alert (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
            cc: clang
            cxx: clang++
            triplet: x64-linux
          - os: windows
            runner: windows-2022
            cc: clang-cl
            cxx: clang-cl
            triplet: x64-windows
          - os: macos
            runner: macos-14
            cc: clang
            cxx: clang++
            triplet: arm64-osx
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Bootstrap vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Setup Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          ninja --version

      - name: Setup dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang lld python3

      - name: Setup dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja python3

      - name: Setup vcpkg cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/vcpkg/archives
            ~/.cache/vcpkg/src
            ${{ env.VCPKG_ROOT }}/archives
            ${{ env.VCPKG_ROOT }}/src
          key: vcpkg-${{ matrix.os }}-pr-perf-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset=release -DPHYNITY_BUILD_TESTS=ON -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: Build
        run: cmake --build build/release -j

      - name: Run performance-labeled tests
        run: |
          python tools/run_ctest_with_retries.py \
            --build-dir build/release \
            --config Release \
            --label performance \
            --parallel 2 \
            --max-retries 2 \
            --report-file build/release/test-retries/performance-pr-${{ matrix.os }}.txt \
            --output-on-failure

      - name: Compare against perf baselines
        shell: bash
        run: |
          set -o pipefail
          python tools/performance_regression_check.py \
            --threshold 0.05 \
            --threshold-config tests/golden_outputs/performance/thresholds.json \
            --strict-orphans \
            | tee build/release/perf-regression-summary.txt

      - name: Publish PR performance summary
        if: always()
        shell: bash
        run: |
          {
            echo "## PR Performance Alert (${{ matrix.os }})"
            echo
            cat build/release/perf-regression-summary.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-performance-alert-${{ matrix.os }}
          path: |
            tests/golden_outputs/performance/*.json
            tests/golden_outputs/performance/*.current.json
            tests/golden_outputs/performance/thresholds.json
            build/release/test-retries/
            build/release/perf-regression-summary.txt
          retention-days: 30